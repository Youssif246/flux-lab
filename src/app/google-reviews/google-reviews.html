<section class="reviews-section" id="reviews">
  <div class="reviews-container">
    <div class="section-header">
      <span class="badge font-gold">GOOGLE REVIEWS</span>
      <h2>Google Review Solutions.</h2>
      <p>Help customers leave a 5-star review in seconds with a single contactless tap.</p>
    </div>

    <!-- Main Google Review Highlight Card -->
    <div class="reviews-hero-card">
      <div class="reviews-hero-content">
        <span class="pill-badge">TAP TO REVIEW</span>
        <h3>Help</h3>
        <p class="hero-desc">
          customers <br>
          leave a review <br>
          in seconds with <br>
          a single tap.
        </p>
      </div>

      <div class="reviews-hero-image-wrapper">
        <img src="google-review-main.png" alt="FLUX Google Review Card" class="reviews-hero-img">
      </div>
    </div>

    <!-- Review Advantages Grid -->
    <div class="reviews-features-grid">
      <div class="review-feature-card" *ngFor="let item of fetures">
        <div class="img-container">
          <img [src]="item.image" [alt]="item.title" class="feature-img">
        </div>
        <h3 class="feature-title">{{ item.title }}</h3>
        <p class="feature-desc">{{ item.description }}</p>
      </div>
    </div>
  </div>
</section>
