<section class="hero-section" id="hero">
  <!-- Glowing Background Mesh bubbles for luxury look -->
  <div class="glow-bubble glow-1"></div>
  <div class="glow-bubble glow-2"></div>

  <div class="hero-container">
    <div class="hero-content">
      <!-- Animated Tagline Badge -->
      <div class="hero-badge">
        <span class="badge-dot"></span>
        <span class="badge-text">Next-Gen Contactless Networking</span>
      </div>

      <!-- Main Headline -->
      <h1 class="hero-title">
        One Card.<br/>
        Endless Possibilities.
      </h1>

      <!-- Supporting Subheadline -->
      <p class="hero-subtitle">
        A premium smart NFC business card that lets you share your entire professional profile, social accounts, and booking links with a single tap.
      </p>

      <!-- Action buttons -->
      <div class="hero-actions">
        <button (click)="scrollTo('packages')" class="btn-hero-primary">
          <span>Get Your Card</span>
          <i class="fa-solid fa-arrow-right"></i>
        </button>
        <button (click)="scrollTo('demo')" class="btn-hero-secondary">
          <span>See How It Works</span>
        </button>
      </div>
    </div>

    <!-- Main Mockup Image Container -->
    <div class="hero-mockup-wrapper">
      <div class="hero-mockup-shadow"></div>
      <img class="hero-mockup-img" src="hero-image-AiImageEnhancer-removebg-preview.png" alt="FLUX Premium Smart Card" />
    </div>
  </div>
</section>
