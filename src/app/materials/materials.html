<section class="materials-section" id="materials">
  <div class="materials-container">
    <div class="section-header reveal">
      <span class="badge">PHYSICAL CRAFTSMANSHIP</span>
      <h2>Premium Materials</h2>
      <p>Luxury textures and bespoke finishes designed to match any brand identity.</p>
    </div>

    <div class="materials-wrapper">
      <div class="materials-grid">
        <div class="material-card reveal" *ngFor="let item of materials; let i = index" [style.--delay.ms]="i * 80" #cardElement (mousemove)="onMouseMove($event, cardElement)" (mouseleave)="onMouseLeave(cardElement)">
          <div class="material-image-holder">
            <img [src]="item.image" [alt]="item.name" class="material-img">
            <!-- Gold/glass reflection swipe overlay -->
            <div class="card-glass-shine"></div>
          </div>
          <p class="material-name">{{ item.name }}</p>
        </div>
      </div>
    </div>
  </div>
</section>
