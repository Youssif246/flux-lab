<section class="cta-section" id="cta">
  <div class="cta-box">
    <!-- Glowing Accent -->
    <div class="cta-glow"></div>

    <div class="cta-content">
      <span class="cta-badge">SMART NETWORKING</span>

      <h2>
        Ready To Elevate <br/>
        Your Brand?
      </h2>

      <p>
        Transform every business interaction into an opportunity with FLUX.
      </p>

      <button (click)="scrollToPackages()" class="btn-cta">
        <span>Get Your FLUX Card</span>
        <i class="fa-solid fa-arrow-right"></i>
      </button>
    </div>

    <!-- Luxury Overlay Card/Phone Image Mockup -->
    <img src="fotter-image.png" alt="FLUX Cards Showcase" class="cta-image">
  </div>
</section>
